# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Only starts db + redis for local development. Run API and Web locally.

services:
  db:
    ports:
      - '5432:5432'

  redis:
    ports:
      - '6379:6379'

  # Disable api & web in dev mode (run locally with hot reload)
  api:
    profiles: ['production']

  web:
    profiles: ['production']
